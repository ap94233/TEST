<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>6/6 活動頁面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* 讓圖片從頂部開始排 */
            min-height: 100vh; 
            background: #ffffff; /* 這裡改成了白色 */
        }
        img { 
            max-width: 100%; 
            height: auto; 
        }
    </style>
</head>
<body>
    <img id="myImage" src="">

    <script>
        var timestamp = new Date().getTime();
        // 這裡會自動幫你的 cat.png 加上時間戳，保證 6/6 當天換圖大家都能立刻看到
        document.getElementById('myImage').src = "cat.png?t=" + timestamp;
    </script>
</body>
</html>
