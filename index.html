<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>6/6 活動頁面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #ffffff; 
            overflow: hidden;
        }
        img { 
            max-width: 90%; 
            max-height: 90vh; 
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0,0,0,0); /* 加一點淡淡的陰影，看起來更專業 */
        }
    </style>
</head>
<body>
    <img id="myImage" src="">

    <script>
        var timestamp = new Date().getTime();
        document.getElementById('myImage').src = "cat.png?t=" + timestamp;
    </script>
</body>
</html>
