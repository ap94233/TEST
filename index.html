<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>6/6 活動頁面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #ffffff; 
            width: 100%;
            overflow-x: hidden;
        }
        body { 
            display: block; 
        }
        img { 
            display: block; 
            width: 100%; 
            height: auto; 
            margin: 0; 
        }
    </style>
</head>
<body>
    <img id="myImage" src="">

    <script>
        // 破解快取程式碼，保證換圖能立刻顯示
        var timestamp = new Date().getTime();
        document.getElementById('myImage').src = "cat.png?t=" + timestamp;
    </script>
</body>
</html>
